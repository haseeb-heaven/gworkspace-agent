name: GWorkspace Agent CI/CD

on:
  push:
    branches: ["main", "master", "develop", "feature/**"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:
    inputs:
      run_live_integration:
        description: "Run live Google Workspace integration tests"
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID: gen-lang-client-0632693223
  SERVICE: gworkspace-agent
  REGION: us-central1
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Lint + Type Check
  # ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy
          pip install -e .

      - name: Ruff lint
        run: ruff check .

      - name: Type check
        run: mypy src --ignore-missing-imports

  # ──────────────────────────────────────────
  # JOB 2: Unit Tests (all mocked — no GWS)
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Run unit tests
        env:
          PYTHONPATH: src
          CI: "true"
          DEFAULT_RECIPIENT_EMAIL: bot@example.com
          OPENAI_API_KEY: fake_key_for_testing
          LLM_API_KEY: fake_key_for_testing
        run: |
          pytest tests/ \
            -v \
            -m "not live_integration" \
            --ignore=tests/manual \
            --ignore=tests/test_live_integration.py \
            --cov=src \
            --cov=gws_assistant \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            --tb=short \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ──────────────────────────────────────────
  # JOB 3: Integration Tests (mocked GWS)
  # ──────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Mocked)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Run integration tests (mocked only)
        env:
          PYTHONPATH: src:tests
          CI: "true"
          OPENAI_API_KEY: fake_key_for_testing
          LLM_API_KEY: fake_key_for_testing
        run: |
          pytest tests/test_integration.py \
            -v \
            -m "not live_integration" \
            --cov=gws_assistant.langgraph_workflow \
            --cov=gws_assistant.execution \
            --cov-report=term-missing \
            --cov-fail-under=65 \
            --tb=short

  # ──────────────────────────────────────────
  # JOB 4: Security Scan
  # ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: |
          pip install bandit safety pip-audit

      - name: Bandit — code security
        run: bandit -r gws_assistant/ -ll --skip B101 -q

      - name: Safety — dependency vulnerabilities
        run: safety check --full-report || true

      - name: pip-audit — CVE scan
        run: pip-audit --skip-editable || true

  # ──────────────────────────────────────────
  # JOB 5: Auto-merge on PR (if all pass)
  # ──────────────────────────────────────────
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security]
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Auto merge if all checks pass
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # JOB 6: Notify Jules on failure (feedback loop)
  # ──────────────────────────────────────────
  notify-jules-on-failure:
    name: Notify Jules on CI Failure
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security]
    if: |
      failure() &&
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Post CI failure comment on PR
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## ❌ CI Pipeline Failed

          One or more checks failed. Please fix the following and push an update:

          - **Unit Tests**: Check test failures in the Actions log
          - **Integration Tests**: Verify mocked GWS logic is correct
          - **Security Scan**: Fix any HIGH/CRITICAL issues found by bandit or pip-audit

          **Action required**: Review the [failed workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) and fix the issues."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # JOB 7: Live Integration (manual only)
  # ──────────────────────────────────────────
  live-integration:
    name: Live Integration Tests (Manual)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_integration }}
    needs: lint
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      GWS_BINARY_PATH: ${{ secrets.GWS_BINARY_PATH }}
      LOG_LEVEL: INFO
      RUN_LIVE_INTEGRATION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run live GWS tests
        run: pytest -q -m live_integration -v

  # ──────────────────────────────────────────
  # JOB 8: Deploy to Cloud Run (main/master only)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: [unit-tests, integration-tests, security]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker gcr.io

      - name: Build and Push Container
        run: |
          docker build -t "gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}" .
          docker push "gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080
