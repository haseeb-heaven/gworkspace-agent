[pytest]
pythonpath = src
markers =
    live_integration: tests that exercise real Google Workspace side effects and require secrets.
    gmail: Gmail related tests
    docs: Google Docs related tests
    sheets: Google Sheets related tests
    drive: Google Drive related tests
    calendar: Google Calendar related tests
    tasks: Google Tasks related tests
    classroom: Google Classroom related tests
    keep: Google Keep related tests
    forms: Google Forms related tests
    slides: Google Slides related tests
    contacts: Google Contacts related tests
    admin: Admin SDK related tests
    script: Apps Script related tests
    modelarmor: Model Armor related tests
    events: Events related tests
    manual: Manual tests that might require human interaction or specific environment state.

# Default to core services only, excluding manual tests
# User can add/remove services here
# Example: -m "not manual and (gmail or docs or sheets or drive or calendar or tasks or keep)"
addopts = -v -m "not manual and (gmail or docs or sheets or drive or calendar or tasks or keep)"

filterwarnings =
    ignore::pydantic.json_schema.PydanticJsonSchemaWarning