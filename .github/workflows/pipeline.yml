name: GWorkspace Agent CI/CD

on:
  push:
    branches: ["main", "master", "develop", "feature/**"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:
    inputs:
      run_live_integration:
        description: "Run live Google Workspace integration tests"
        required: false
        default: false
        type: boolean

env:
  PROJECT_ID: gen-lang-client-0632693223
  SERVICE: gworkspace-agent
  REGION: us-central1
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Lint + Type Check
  # ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy
          pip install -e .

      - name: Ruff lint
        id: ruff
        run: ruff check . 2>&1 | tee /tmp/lint_errors.txt

      - name: Type check
        id: mypy
        run: mypy src --ignore-missing-imports 2>&1 | tee -a /tmp/lint_errors.txt

      - name: Save lint errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-errors
          path: /tmp/lint_errors.txt

  # ──────────────────────────────────────────
  # JOB 2: Unit Tests (all mocked — no GWS)
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Run unit tests
        id: unit_tests
        env:
          PYTHONPATH: src
          CI: "true"
          DEFAULT_RECIPIENT_EMAIL: bot@example.com
          OPENAI_API_KEY: fake_key_for_testing
          LLM_API_KEY: fake_key_for_testing
        run: |
          pytest tests/ \
            -v \
            -m "not live_integration" \
            --ignore=tests/manual \
            --ignore=tests/test_live_integration.py \
            --cov=src \
            --cov=gws_assistant \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            --tb=short \
            -q 2>&1 | tee /tmp/unit_test_errors.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Save unit test errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-errors
          path: /tmp/unit_test_errors.txt

  # ──────────────────────────────────────────
  # JOB 3: Integration Tests (mocked GWS)
  # ──────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Mocked)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Run integration tests (mocked only)
        id: integration_tests
        env:
          PYTHONPATH: src:tests
          CI: "true"
          OPENAI_API_KEY: fake_key_for_testing
          LLM_API_KEY: fake_key_for_testing
        run: |
          pytest tests/test_integration.py \
            -v \
            -m "not live_integration" \
            --cov=gws_assistant.langgraph_workflow \
            --cov=gws_assistant.execution \
            --cov-report=term-missing \
            --cov-fail-under=65 \
            --tb=short 2>&1 | tee /tmp/integration_errors.txt

      - name: Save integration errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-errors
          path: /tmp/integration_errors.txt

  # ──────────────────────────────────────────
  # JOB 4: Security Scan
  # ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit safety pip-audit

      - name: Bandit — code security
        run: bandit -r gws_assistant/ -ll --skip B101 -q 2>&1 | tee /tmp/security_errors.txt || true

      - name: Safety — dependency vulnerabilities
        run: safety check --full-report 2>&1 | tee -a /tmp/security_errors.txt || true

      - name: pip-audit — CVE scan
        run: pip-audit --skip-editable 2>&1 | tee -a /tmp/security_errors.txt || true

      - name: Save security errors
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-errors
          path: /tmp/security_errors.txt

  # ──────────────────────────────────────────
  # JOB 5: Auto-merge on PR (if all pass)
  # ──────────────────────────────────────────
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security]
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Auto merge if all checks pass
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # JOB 6: FULLY AUTONOMOUS — Jules feedback loop
  # On CI failure: collect errors, find linked issue,
  # post @jules comment so Jules auto-fixes and re-pushes
  # ──────────────────────────────────────────
  jules-auto-fix:
    name: Jules Auto-Fix Loop
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security]
    if: |
      failure() &&
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Download all error artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
        continue-on-error: true

      - name: Collect all CI errors
        id: collect_errors
        run: |
          ERROR_BODY=""

          for f in /tmp/artifacts/**/*.txt; do
            if [ -f "$f" ]; then
              CONTENT=$(cat "$f" | head -80)
              ARTIFACT_NAME=$(basename $(dirname $f))
              ERROR_BODY="$ERROR_BODY\n### $ARTIFACT_NAME\n\`\`\`\n$CONTENT\n\`\`\`\n"
            fi
          done

          # Write to file to avoid shell escaping issues
          printf "%b" "$ERROR_BODY" > /tmp/all_errors.txt
          echo "errors_collected=true" >> $GITHUB_OUTPUT

      - name: Find linked Issue number from PR
        id: find_issue
        run: |
          # Try to get closing issue references via gh
          ISSUE_NUM=$(gh pr view ${{ github.event.pull_request.number }} \
            --json closingIssuesReferences \
            -q '.closingIssuesReferences[0].number' 2>/dev/null || echo "")

          # Fallback: parse PR body for "Fixes #N" or "Closes #N"
          if [ -z "$ISSUE_NUM" ]; then
            PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body')
            ISSUE_NUM=$(echo "$PR_BODY" | grep -oiP '(?:fixes|closes|resolves)\s+#\K[0-9]+' | head -1)
          fi

          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
          echo "Found linked issue: $ISSUE_NUM"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post @jules fix request on linked Issue
        if: steps.find_issue.outputs.issue_number != ''
        run: |
          ERRORS=$(cat /tmp/all_errors.txt)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUM="${{ github.event.pull_request.number }}"

          gh issue comment ${{ steps.find_issue.outputs.issue_number }} \
            --body "## ❌ CI Failed on PR #${PR_NUM} — @jules please fix

          The CI pipeline failed. Please review the errors below, fix the code, and push an updated commit to the PR branch.

          **PR:** ${PR_URL}
          **Failed Run:** ${RUN_URL}

          ---

          ## Errors

          ${ERRORS}

          ---

          **Instructions for @jules:**
          1. Fix all failing tests and lint errors listed above
          2. Do NOT change test logic — fix the source code
          3. Push the fix to the same PR branch: \`${{ github.head_ref }}\`
          4. Do not merge — CI will auto-merge once all checks pass"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback — Post on PR if no linked Issue found
        if: steps.find_issue.outputs.issue_number == ''
        run: |
          ERRORS=$(cat /tmp/all_errors.txt)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## ❌ CI Failed — Manual fix required

          Could not find a linked GitHub Issue to notify @jules automatically.

          **Failed Run:** ${RUN_URL}

          ## Errors
          ${ERRORS}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # JOB 7: Live Integration (manual only)
  # ──────────────────────────────────────────
  live-integration:
    name: Live Integration Tests (Manual)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_integration }}
    needs: lint
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      GWS_BINARY_PATH: ${{ secrets.GWS_BINARY_PATH }}
      LOG_LEVEL: INFO
      RUN_LIVE_INTEGRATION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run live GWS tests
        run: pytest -q -m live_integration -v

  # ──────────────────────────────────────────
  # JOB 8: Deploy to Cloud Run (main/master only)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: [unit-tests, integration-tests, security]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker gcr.io

      - name: Build and Push Container
        run: |
          docker build -t "gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}" .
          docker push "gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080
