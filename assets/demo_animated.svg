<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)" rx="10" />

  <style>
    @keyframes fadeLoop {
      0%, 30% { opacity: 1; transform: scale(1); }
      33%, 63% { opacity: 0; transform: scale(0.95); }
      66%, 96% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeLoop2 {
      0%, 30% { opacity: 0; transform: scale(0.95); }
      33%, 63% { opacity: 1; transform: scale(1); }
      66%, 96% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 0; transform: scale(0.95); }
    }
    @keyframes fadeLoop3 {
      0%, 30% { opacity: 0; transform: scale(0.95); }
      33%, 63% { opacity: 0; transform: scale(0.95); }
      66%, 96% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.95); }
    }
    .interface { transition: all 0.5s ease-in-out; }
    #cli { animation: fadeLoop 12s infinite; }
    #gui { animation: fadeLoop2 12s infinite; }
    #web { animation: fadeLoop3 12s infinite; }
    .cursor { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <!-- CLI Interface -->
  <g id="cli" class="interface" filter="url(#shadow)">
    <rect x="100" y="80" width="600" height="340" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="2" />
    <circle cx="125" cy="105" r="6" fill="#ff5f56" />
    <circle cx="145" cy="105" r="6" fill="#ffbd2e" />
    <circle cx="165" cy="105" r="6" fill="#27c93f" />
    <text x="120" y="150" font-family="monospace" font-size="16" fill="#58a6ff">$ python gws_cli.py</text>
    <text x="120" y="180" font-family="monospace" font-size="14" fill="#c9d1d9">
      <tspan x="120" dy="1.2em">Initializing Google Workspace Agent...</tspan>
      <tspan x="120" dy="1.5em" fill="#3fb950">✓ Authentication successful.</tspan>
      <tspan x="120" dy="1.5em" fill="#d29922">! Read-only mode active.</tspan>
      <tspan x="120" dy="1.5em">> Enter task: </tspan>
    </text>
    <rect x="230" y="275" width="10" height="18" fill="#58a6ff" class="cursor" />
  </g>

  <!-- GUI Interface -->
  <g id="gui" class="interface" filter="url(#shadow)" opacity="0">
    <rect x="100" y="80" width="600" height="340" rx="10" fill="#2d3436" stroke="#636e72" stroke-width="2" />
    <rect x="110" y="120" width="580" height="290" rx="5" fill="#1e272e" />
    <text x="300" y="105" font-family="sans-serif" font-size="18" font-weight="bold" fill="#ffffff">GWS Desktop Agent</text>
    <rect x="130" y="140" width="150" height="40" rx="5" fill="#0984e3" />
    <text x="150" y="165" font-family="sans-serif" font-size="14" fill="white">Analyze Task</text>
    <rect x="290" y="140" width="380" height="40" rx="5" fill="#4b4b4b" />
    <text x="305" y="165" font-family="sans-serif" font-size="14" fill="#bdc3c7">Search my Drive for invoices...</text>
    <rect x="130" y="200" width="540" height="180" rx="5" fill="#000000" opacity="0.3" />
    <path d="M150 350 L250 280 L350 310 L450 240 L550 290 L650 220" stroke="#00d2d3" stroke-width="3" fill="none" />
  </g>

  <!-- Web Interface -->
  <g id="web" class="interface" filter="url(#shadow)" opacity="0">
    <rect x="100" y="80" width="600" height="340" rx="10" fill="#f5f6fa" stroke="#dcdde1" stroke-width="2" />
    <rect x="100" y="80" width="600" height="40" rx="10" fill="#dcdde1" />
    <rect x="150" y="90" width="400" height="20" rx="10" fill="white" />
    <text x="160" y="105" font-family="sans-serif" font-size="12" fill="#7f8c8d">localhost:7860</text>
    <rect x="120" y="140" width="560" height="200" rx="10" fill="white" stroke="#eee" />
    <circle cx="150" cy="180" r="20" fill="#3498db" />
    <rect x="180" y="170" width="300" height="40" rx="15" fill="#f1f2f6" />
    <text x="195" y="195" font-family="sans-serif" font-size="14" fill="#2f3542">How can I help you today?</text>
    <rect x="350" y="240" width="300" height="40" rx="15" fill="#3498db" />
    <text x="365" y="265" font-family="sans-serif" font-size="14" fill="white">Summarize my last 5 emails.</text>
    <rect x="120" y="360" width="450" height="40" rx="20" fill="#white" stroke="#3498db" />
    <text x="140" y="385" font-family="sans-serif" font-size="14" fill="#7f8c8d">Type your request...</text>
  </g>

  <text x="400" y="470" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Google Workspace Agent</text>
  <text x="400" y="490" font-family="sans-serif" font-size="14" fill="#a4b0be" text-anchor="middle">One Engine • Many Interfaces • Professional Automation</text>
</svg>
