name: GWorkspace Agent CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
      - "chore/**"
      - "refactor/**"
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:
    inputs:
      run_live_integration:
        description: "Run live Google Workspace integration tests"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GCP_PROJECT_ID: gen-lang-client-0632693223
  GCP_REGION: us-central1
  GCP_SERVICE: gworkspace-agent
  PYTHON_VERSION: "3.11"

jobs:
  # ──────────────────────────────────────────
  # JOB 1: Lint + Type Check
  # ──────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy
          pip install -e .

      - name: Ruff lint
        id: ruff
        run: ruff check . 2>&1 | tee /tmp/lint_errors.txt

      - name: Type check
        id: mypy
        run: mypy src --ignore-missing-imports 2>&1 | tee -a /tmp/lint_errors.txt

      - name: Save lint errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-errors
          path: /tmp/lint_errors.txt

  # ──────────────────────────────────────────
  # JOB 2: Unit Tests (all mocked — no GWS)
  # ──────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Run unit tests
        id: unit_tests
        env:
          PYTHONPATH: src
          CI: "true"
          DEFAULT_RECIPIENT_EMAIL: bot@example.com
          OPENAI_API_KEY: fake_key_for_testing
          LLM_API_KEY: fake_key_for_testing
        run: |
          pytest tests/ \
            -v \
            -m "not live_integration" \
            --ignore=tests/manual \
            --ignore=tests/test_live_integration.py \
            --cov=src \
            --cov=gws_assistant \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 \
            --tb=short \
            -q 2>&1 | tee /tmp/unit_test_errors.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      - name: Save unit test errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-errors
          path: /tmp/unit_test_errors.txt

  # ──────────────────────────────────────────
  # JOB 3: Integration Tests (mocked GWS)
  # ──────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Mocked)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
          pip install -e .

      - name: Run integration tests (mocked only)
        id: integration_tests
        env:
          PYTHONPATH: src:tests
          CI: "true"
          OPENAI_API_KEY: fake_key_for_testing
          LLM_API_KEY: fake_key_for_testing
        run: |
          pytest tests/test_integration.py \
            -v \
            -m "not live_integration" \
            --cov=gws_assistant.langgraph_workflow \
            --cov=gws_assistant.execution \
            --cov-report=term-missing \
            --cov-fail-under=65 \
            --tb=short 2>&1 | tee /tmp/integration_errors.txt

      - name: Save integration errors
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-errors
          path: /tmp/integration_errors.txt

  # ──────────────────────────────────────────
  # JOB 4: Security Scan
  # ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install security tools
        run: pip install bandit safety pip-audit

      - name: Bandit — code security
        run: bandit -r gws_assistant/ -ll --skip B101 -q 2>&1 | tee /tmp/security_errors.txt || true

      - name: Safety — dependency vulnerabilities
        run: safety check --full-report 2>&1 | tee -a /tmp/security_errors.txt || true

      - name: pip-audit — CVE scan
        run: pip-audit --skip-editable 2>&1 | tee -a /tmp/security_errors.txt || true

      - name: Save security errors
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-errors
          path: /tmp/security_errors.txt

  # ──────────────────────────────────────────
  # JOB 5: Review Guard
  # Blocks merge if ANY unresolved review comment exists
  # ──────────────────────────────────────────
  review-guard:
    name: Review Guard (Block if Unresolved Comments)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security]
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]'
    permissions:
      pull-requests: read
    outputs:
      safe_to_merge: ${{ steps.check_reviews.outputs.safe_to_merge }}
    steps:
      - uses: actions/checkout@v4

      - name: Check for unresolved review threads
        id: check_reviews
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          REPO="${{ github.repository }}"

          RESPONSE=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 50) {
                    nodes {
                      isResolved
                      isOutdated
                      comments(first: 1) {
                        nodes {
                          author { login }
                          body
                        }
                      }
                    }
                  }
                }
              }
            }' \
            -f owner="$(echo $REPO | cut -d/ -f1)" \
            -f repo="$(echo $REPO | cut -d/ -f2)" \
            -F pr=$PR_NUM)

          UNRESOLVED=$(echo "$RESPONSE" | python3 << 'PYEOF'
import sys, json
data = json.load(sys.stdin)
threads = data['data']['repository']['pullRequest']['reviewThreads']['nodes']
count = sum(1 for t in threads if not t['isResolved'] and not t['isOutdated'])
print(count)
PYEOF
)

          echo "Unresolved review threads: $UNRESOLVED"

          if [ "$UNRESOLVED" -gt 0 ]; then
            echo "safe_to_merge=false" >> $GITHUB_OUTPUT
            echo "::error::Merge blocked — $UNRESOLVED unresolved review thread(s) found."
            exit 1
          else
            echo "safe_to_merge=true" >> $GITHUB_OUTPUT
            echo "All review threads resolved. Safe to merge."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify about unresolved comments
        if: failure()
        run: |
          PR_NUM=${{ github.event.pull_request.number }}
          REPO="${{ github.repository }}"

          RESPONSE=$(gh api graphql -f query='
            query($owner: String!, $repo: String!, $pr: Int!) {
              repository(owner: $owner, name: $repo) {
                pullRequest(number: $pr) {
                  reviewThreads(first: 50) {
                    nodes {
                      isResolved
                      isOutdated
                      path
                      line
                      comments(first: 1) {
                        nodes {
                          author { login }
                          body
                          url
                        }
                      }
                    }
                  }
                }
              }
            }' \
            -f owner="$(echo $REPO | cut -d/ -f1)" \
            -f repo="$(echo $REPO | cut -d/ -f2)" \
            -F pr=$PR_NUM)

          COMMENT_DETAILS=$(echo "$RESPONSE" | python3 << 'PYEOF'
import sys, json
data = json.load(sys.stdin)
threads = data['data']['repository']['pullRequest']['reviewThreads']['nodes']
lines = []
for t in threads:
    if not t['isResolved'] and not t['isOutdated']:
        c = t['comments']['nodes'][0] if t['comments']['nodes'] else {}
        author = c.get('author', {}).get('login', 'unknown')
        body = c.get('body', '')[:200]
        path = t.get('path', 'unknown file')
        line = t.get('line', '?')
        url = c.get('url', '')
        lines.append('- **' + str(path) + ':' + str(line) + '** by @' + author + ': ' + body + '\n  ' + url)
print('\n'.join(lines))
PYEOF
)

          ISSUE_NUM=$(gh pr view $PR_NUM \
            --json closingIssuesReferences \
            -q '.closingIssuesReferences[0].number' 2>/dev/null || echo "")

          if [ -n "$ISSUE_NUM" ]; then
            gh issue comment "$ISSUE_NUM" \
              --body "## ⚠️ Merge Blocked on PR #${PR_NUM} — @google-labs-jules please address review comments

There are **unresolved review comments** on this PR that must be addressed before it can be merged.

**PR:** ${{ github.event.pull_request.html_url }}
**Head Branch:** \`${{ github.head_ref }}\`
**Target Branch:** \`${{ github.event.pull_request.base.ref }}\`

---
## Unresolved Comments

${COMMENT_DETAILS}

---
**@google-labs-jules instructions:**
1. Read each unresolved comment carefully
2. Fix the code exactly as suggested by the reviewer
3. Push fix to branch: \`${{ github.head_ref }}\`
4. Do NOT resolve threads manually — CI will re-check after your push"
          else
            gh pr comment $PR_NUM \
              --body "## ⚠️ Merge Blocked — Unresolved Review Comments

@google-labs-jules — please address all unresolved review comments before this PR can be merged.

**Head Branch:** \`${{ github.head_ref }}\`
**Target Branch:** \`${{ github.event.pull_request.base.ref }}\`

## Unresolved Comments
${COMMENT_DETAILS}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # JOB 6: Auto-merge into PR's actual base branch
  # Uses github.event.pull_request.base.ref — NOT hardcoded main/master
  # ──────────────────────────────────────────
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest
    needs: [review-guard]
    if: |
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      needs.review-guard.outputs.safe_to_merge == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Log merge target
        run: |
          echo "Merging PR #${{ github.event.pull_request.number }}"
          echo "Head : ${{ github.head_ref }}"
          echo "Base : ${{ github.event.pull_request.base.ref }}"

      - name: Enable auto-merge into base branch
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch \
            --subject "${{ github.event.pull_request.title }}" \
            --body "Auto-merged by CI into \`${{ github.event.pull_request.base.ref }}\`"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # JOB 7: CI Failure — Tag @google-labs-jules to fix
  # ──────────────────────────────────────────
  jules-auto-fix:
    name: Jules Auto-Fix Loop
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, security]
    if: |
      failure() &&
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all error artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
        continue-on-error: true

      - name: Collect all CI errors
        run: |
          ERROR_BODY=""
          for f in /tmp/artifacts/**/*.txt; do
            if [ -f "$f" ]; then
              CONTENT=$(head -80 "$f")
              ARTIFACT_NAME=$(basename "$(dirname "$f")")
              ERROR_BODY="${ERROR_BODY}\n### ${ARTIFACT_NAME}\n\`\`\`\n${CONTENT}\n\`\`\`\n"
            fi
          done
          printf "%b" "$ERROR_BODY" > /tmp/all_errors.txt

      - name: Find linked Issue number from PR
        id: find_issue
        run: |
          ISSUE_NUM=$(gh pr view ${{ github.event.pull_request.number }} \
            --json closingIssuesReferences \
            -q '.closingIssuesReferences[0].number' 2>/dev/null || echo "")

          if [ -z "$ISSUE_NUM" ]; then
            PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} --json body -q '.body')
            ISSUE_NUM=$(echo "$PR_BODY" | grep -oiP '(?:fixes|closes|resolves)\s+#\K[0-9]+' | head -1)
          fi

          echo "issue_number=$ISSUE_NUM" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post fix request on linked Issue
        if: steps.find_issue.outputs.issue_number != ''
        run: |
          ERRORS=$(cat /tmp/all_errors.txt)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          HEAD_BRANCH="${{ github.head_ref }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"

          gh issue comment ${{ steps.find_issue.outputs.issue_number }} \
            --body "## ❌ CI Failed on PR #${PR_NUM} — @google-labs-jules please fix

CI pipeline failed. Fix the errors below and push to the same branch.

**PR:** ${PR_URL}
**Head Branch:** \`${HEAD_BRANCH}\`
**Target Branch:** \`${BASE_BRANCH}\`
**Failed Run:** ${RUN_URL}

---
## Errors
${ERRORS}
---

**@google-labs-jules instructions:**
1. Fix all failing tests and lint errors listed above
2. Fix source code only — do NOT modify test logic
3. Push fix to branch: \`${HEAD_BRANCH}\`
4. Do NOT merge — CI will auto-merge into \`${BASE_BRANCH}\` once all checks pass"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fallback — post on PR directly if no linked Issue found
        if: steps.find_issue.outputs.issue_number == ''
        run: |
          ERRORS=$(cat /tmp/all_errors.txt)
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          HEAD_BRANCH="${{ github.head_ref }}"
          BASE_BRANCH="${{ github.event.pull_request.base.ref }}"

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "## ❌ CI Failed — @google-labs-jules please fix

@google-labs-jules — CI pipeline failed. No linked Issue was found so tagging here directly.

**Head Branch:** \`${HEAD_BRANCH}\`
**Target Branch:** \`${BASE_BRANCH}\`
**Failed Run:** ${RUN_URL}

## Errors
${ERRORS}

**Instructions:**
1. Fix all errors above
2. Push fix to branch: \`${HEAD_BRANCH}\`
3. Do NOT merge — CI will auto-merge into \`${BASE_BRANCH}\` once all checks pass"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────
  # JOB 8: Live Integration (manual only)
  # ──────────────────────────────────────────
  live-integration:
    name: Live Integration Tests (Manual)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_integration }}
    needs: lint
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      GWS_BINARY_PATH: ${{ secrets.GWS_BINARY_PATH }}
      LOG_LEVEL: INFO
      RUN_LIVE_INTEGRATION: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run live GWS tests
        run: pytest -q -m live_integration -v

  # ──────────────────────────────────────────
  # JOB 9: Deploy to Cloud Run (main/master only)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: [unit-tests, integration-tests, security]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker gcr.io

      - name: Build and Push Container
        run: |
          docker build -t "gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_SERVICE }}:${{ github.sha }}" .
          docker push "gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_SERVICE }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.GCP_SERVICE }}
          region: ${{ env.GCP_REGION }}
          image: gcr.io/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_SERVICE }}:${{ github.sha }}
          flags: --allow-unauthenticated --port=8080
