name: Re-sync Open PRs on Develop Push

# Triggered whenever develop branch gets a new commit.
# Re-merges develop into every open PR targeting develop
# so no PR ever becomes stale/conflicted after a develop push.
# After syncing, waits for CI pipeline checks to pass before allowing merge.

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  resync-prs:
    name: Re-sync All Open PRs → develop
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop (full history)
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all remote branches
        run: git fetch --all --prune

      - name: Re-sync all open PRs targeting develop
        run: |
          # Get all open PRs targeting develop
          PRS=$(gh pr list --base develop --state open --json number,headRefName \
                  -q '.[] | "\(.number) \(.headRefName)"')

          if [ -z "$PRS" ]; then
            echo "No open PRs targeting develop. Nothing to do."
            exit 0
          fi

          echo "Open PRs found:"
          echo "$PRS"
          echo ""

          SYNCED=0
          FAILED=0

          while IFS= read -r line; do
            [ -z "$line" ] && continue

            PR_NUM=$(echo "$line" | awk '{print $1}')
            BRANCH=$(echo "$line" | awk '{print $2}')

            echo "──────────────────────────────────────"
            echo "PR #$PR_NUM  →  branch: $BRANCH"

            # Checkout or create local tracking branch
            if git checkout "$BRANCH" 2>/dev/null; then
              git pull origin "$BRANCH" --no-rebase
            else
              git checkout -b "$BRANCH" "origin/$BRANCH"
            fi

            if [ $? -ne 0 ]; then
              echo "  [FAIL] Could not checkout $BRANCH — skipping"
              FAILED=$((FAILED + 1))
              git checkout develop
              continue
            fi

            # Check if already up-to-date
            MERGE_BASE=$(git merge-base HEAD origin/develop)
            BASE_TIP=$(git rev-parse origin/develop)

            if [ "$MERGE_BASE" = "$BASE_TIP" ]; then
              echo "  [SKIP] Already up-to-date with develop"
              git checkout develop
              SYNCED=$((SYNCED + 1))
              continue
            fi

            # Step 1: Try clean patience merge
            if git merge origin/develop --no-edit --strategy-option=patience; then
              echo "  [OK] Clean merge — no conflicts"
            else
              echo "  [CONFLICT] Auto-resolving (feature branch wins via ours)..."
              CONFLICTING=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
              echo "  Conflicting files: $CONFLICTING"

              git merge --abort

              # ours strategy — feature branch always wins
              if git merge origin/develop --no-edit --strategy=ours; then
                echo "  [OK] Resolved via ours strategy"
              else
                echo "  [FAIL] Could not resolve conflicts for $BRANCH — skipping"

                printf '⚠️ **Auto Conflict Resolution Failed (sync-open-prs)**\n\nDevelop was updated and CI attempted to re-sync `%s` but found unresolvable conflicts in:\n\n```\n%s\n```\n\nPlease resolve manually:\n```bash\ngit fetch origin\ngit checkout %s\ngit merge origin/develop\n# fix conflicts\ngit add .\ngit commit -m "chore: resolve merge conflicts with develop"\ngit push\n```' \
                  "$BRANCH" "$CONFLICTING" "$BRANCH" > /tmp/conflict_msg.md

                gh pr comment "$PR_NUM" --body-file /tmp/conflict_msg.md
                FAILED=$((FAILED + 1))
                git merge --abort 2>/dev/null || true
                git checkout develop
                continue
              fi
            fi

            # Push synced branch back
            if git push origin HEAD:"$BRANCH"; then
              echo "  [PUSHED] $BRANCH synced successfully"
            else
              echo "  [FAIL] Push failed for $BRANCH"
              FAILED=$((FAILED + 1))
              git checkout develop
              continue
            fi

            git checkout develop

            # ──────────────────────────────────────────────────────────────
            # WAIT FOR CI CHECKS TO PASS before counting as synced
            # Poll the PR head SHA for check runs every 30s, up to 30 min.
            # If checks pass  → mark synced.
            # If checks fail  → post comment, skip — do NOT merge.
            # ──────────────────────────────────────────────────────────────
            echo "  [WAIT] Waiting for CI pipeline checks on PR #$PR_NUM..."

            HEAD_SHA=$(gh pr view "$PR_NUM" --json headRefOid -q '.headRefOid')
            MAX_WAIT=60   # max 60 polls x 30s = 30 minutes
            POLL=0
            CI_RESULT="unknown"

            while [ $POLL -lt $MAX_WAIT ]; do
              sleep 30
              POLL=$((POLL + 1))

              STATUS=$(gh api \
                "repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs" \
                --jq '
                  if .total_count == 0 then "pending"
                  elif ([.check_runs[] | select(.status != "completed")] | length) > 0 then "pending"
                  elif ([.check_runs[] | select(.conclusion != "success" and .conclusion != "skipped" and .conclusion != "neutral")] | length) > 0 then "failure"
                  else "success"
                  end
                ' 2>/dev/null || echo "pending")

              echo "  [POLL $POLL/$MAX_WAIT] Status: $STATUS"

              if [ "$STATUS" = "success" ]; then
                CI_RESULT="success"
                break
              elif [ "$STATUS" = "failure" ]; then
                CI_RESULT="failure"
                break
              fi
              # else pending — keep polling
            done

            if [ "$CI_RESULT" = "success" ]; then
              echo "  [CI PASS] All checks passed for PR #$PR_NUM"
              SYNCED=$((SYNCED + 1))
            elif [ "$CI_RESULT" = "failure" ]; then
              echo "  [CI FAIL] Checks failed for PR #$PR_NUM — skipping merge"
              gh pr comment "$PR_NUM" --body $'❌ **CI checks failed** after sync with develop. Please review the failing checks before merging.'
              FAILED=$((FAILED + 1))
            else
              echo "  [CI TIMEOUT] Checks did not complete within 30 min for PR #$PR_NUM — skipping merge"
              gh pr comment "$PR_NUM" --body $'⏱️ **CI check timeout** after sync with develop. Checks did not complete within 30 minutes. Please review and merge manually.'
              FAILED=$((FAILED + 1))
            fi

          done <<< "$PRS"

          echo ""
          echo "══════════════════════════════════════"
          echo "  Synced : $SYNCED"
          echo "  Failed : $FAILED"
          echo "══════════════════════════════════════"

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED PR(s) could not be synced or CI failed. Manual resolution required."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
