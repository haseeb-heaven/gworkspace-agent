# .pre-commit-config.yaml
# Pre-commit hooks to prevent committing secrets and sensitive files
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
# Skip temporarily: git commit --no-verify

repos:
  # Block commits that contain .env files or other secret files
  - repo: local
    hooks:
      - id: no-env-files
        name: Block .env and secret files
        entry: |
          bash -c '
          if git diff --cached --name-only | grep -E "(^|\\/)(\\.env(\\.local|\\.\\w+)?$|secrets?\\.(json|yaml|yml)$|config\\.(local|secrets|private)\\.(json|yaml|yml)$|credentials|api_keys|\\.secret$)"; then
            echo "❌ ERROR: Attempting to commit .env or secrets file!"
            echo "These files should NEVER be committed to git."
            echo "Blocked files:"
            git diff --cached --name-only | grep -E "(^|\\/)(\\.env(\\.local|\\.\\w+)?$|secrets?\\.(json|yaml|yml)$|config\\.(local|secrets|private)\\.(json|yaml|yml)$|credentials|api_keys|\\.secret$)"
            echo ""
            echo "✅ Fix:"
            echo "  1. git rm --cached <file>"
            echo "  2. Add to .gitignore"
            echo "  3. Use .env.example template"
            exit 1
          fi
          '
        language: system
        pass_filenames: false
        always_run: true

  # Run unit tests on push to develop or master branches (only if code files changed)
  - repo: local
    hooks:
      - id: run-unit-tests-on-push
        name: Run unit tests on push to develop/master (code changes only)
        entry: |
          bash -c '
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "")
          if [[ "$CURRENT_BRANCH" == "develop" || "$CURRENT_BRANCH" == "master" || "$CURRENT_BRANCH" == "main" ]]; then
            # Get files being pushed
            PUSHED_FILES=$(git diff --name-only HEAD @{u} 2>/dev/null || git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")

            # Check if any code files are present (extensions: .py, .js, .ts, .yaml, .yml, .json, .toml, .cfg, .ini, .sh, .bat)
            CODE_FILES=$(echo "$PUSHED_FILES" | grep -E "\.(py|js|ts|yaml|yml|json|toml|cfg|ini|sh|bat|ps1)$" || echo "")

            if [[ -n "$CODE_FILES" ]]; then
              echo "🧪 Code files detected in push. Running unit tests for branch: $CURRENT_BRANCH"
              echo "📝 Changed code files:"
              echo "$CODE_FILES"
              python -m pytest tests/ -m "not live_integration" --ignore=tests/manual --ignore=tests/test_live_integration.py --ignore=tests/test_live_file_operations.py -v
            else
              echo "⏭️  Skipping unit tests (no code files in push - only docs, images, or other non-code files)"
              echo "📝 Changed files:"
              echo "$PUSHED_FILES"
            fi
          else
            echo "⏭️  Skipping unit tests (not on develop/master/main branch)"
          fi
          '
        language: system
        pass_filenames: false
        stages: [pre-push]

  # Basic hooks only (no heavy dependencies)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
