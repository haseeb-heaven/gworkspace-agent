steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/gen-lang-client-0632693223/gworkspace-agent:$COMMIT_SHA', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/gen-lang-client-0632693223/gworkspace-agent:$COMMIT_SHA']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'gworkspace-agent'
  - '--image=gcr.io/gen-lang-client-0632693223/gworkspace-agent:$COMMIT_SHA'
  - '--region=us-central1'
  - '--platform=managed'
  - '--allow-unauthenticated'
  - '--port=8080'
images:
- 'gcr.io/gen-lang-client-0632693223/gworkspace-agent:$COMMIT_SHA'
options:
  logging: CLOUD_LOGGING_ONLY
